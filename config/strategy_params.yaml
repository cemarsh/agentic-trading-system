# ============================================================
# TRADING SYSTEM — STRATEGY PARAMETERS
# Edit these values to configure system behavior.
# Placeholders marked [FILL_IN] must be set before going live.
# ============================================================

hardware:
  cpu_threshold_pct: 85          # Pause non-essential tasks above this CPU %
  temp_threshold_c: 80           # Alert and pause above this CPU temp (Celsius)
  poll_interval_seconds: 30      # How often to sample hardware metrics

intelligence:
  min_confidence_score: 0.72     # Minimum advisor confidence to execute (0.0–1.0)

whale_watch:
  source_url: "https://www.capitoltrades.com/trades"
  politician_names:
    # Currently active — verified on Capitol Trades 2026-04-09
    - "Rich McCormick"        # Most active: ABT, BLK, HD, ADI, ADP buys
    - "Mike Kelly"            # Large muni/bond trades — watch for equity pivots
    - "Sheldon Whitehouse"    # Sold PEP — watch rotation
    # High historical alpha (2025 returns per Motley Fool research)
    - "Warren Davidson"       # 78.8% return in 2025
    - "Donald Norcross"       # 70.8% return in 2025
    - "Terri Sewell"          # 67.9% return in 2025
    # Long-term tracked
    - "Nancy Pelosi"          # Historically strong returns, tech focus
    - "Dan Crenshaw"          # Energy/defense committee exposure
    - "Tommy Tuberville"      # Agriculture/banking committee
    - "Marjorie Taylor Greene"
    - "Josh Gottheimer"
  whale_trade_min_value: 15000   # Lowered from 50K — captures $15K–$50K range
  max_portfolio_pct_per_trade: 5 # Max % of portfolio per whale signal
  roc_lookback_minutes: 5        # 1-min bars to compute Rate of Change

wheel:
  tickers:
    # === DEFENSE / AI (Tier 1) ===
    - "SHLD"   # Defense Tech ETF — full basket, lowest risk
    - "RTX"    # Raytheon — $218B backlog. CLOSE before Apr 25 earnings
    - "AVAV"   # AeroVironment — Year of the Drones, $874M contracts
    - "PLTR"   # Palantir — AI battlespace. 2% MAX (valuation risk)
    - "LDOS"   # Leidos — steady gov contractor
    # === ENERGY DOMINANCE (Tier 2) ===
    - "XOM"    # ExxonMobil — lagging oil rally, Hormuz disruption
    - "CVX"    # Chevron — same thesis
    - "CCJ"    # Cameco — uranium, nuclear fuel chain
    # === NUCLEAR RENAISSANCE (Tier 3) ===
    - "CEG"    # Constellation Energy — largest US nuclear fleet, +Calpine deal
    - "VST"    # Vistra — 20yr power purchase agreements, 6.6GW expansion
    # === CRITICAL MINERALS (Tier 4) ===
    - "MP"     # MP Materials — only active US rare earth mine, 15% gov stake
    - "ALB"    # Albemarle — lithium, critical minerals
    # === DOMESTIC MANUFACTURING / RESHORING (Tier 5) ===
    - "CAT"    # Caterpillar — infrastructure, domestic industrial
    - "NUE"    # Nucor — US steel, tariff beneficiary
    # === BORDER SECURITY (Tier 6) ===
    - "GEO"    # GEO Group — ICE detention, $38.3B govt plan
    # === TARIFF DEFENSIVE (Tier 7) ===
    - "ABT"    # Abbott — healthcare defensive, congress buying
    - "HD"     # Home Depot — domestic sourcing, congress double-buy
    - "GLD"    # Gold — stagflation hedge, technical dip
    # AVOID: AAPL (China), NVDA (export ban), SPY (trend unclear)
    # AVOID: LMT (earnings Apr 21), NOC (ATH wide spreads)
  target_delta: 0.25             # Tightened from 0.30 — more conservative in volatile market
  expiration_weeks: 2            # Weeks to expiration at entry
  cc_strike_markup_pct: 2.0      # CC strike = cost_basis * (1 + this/100)
  min_premium_pct: 0.8           # Raised from 0.5 — elevated IV means we can demand more

protection:
  trailing_stop_pct: 7.0         # Trailing stop on all equity positions (%)
  gap_tighten_pct: 3.0           # Additional tightening on gap-down signal (%)
  ladder_drop_pct: 5.0           # Drawdown % from entry to trigger ladder buy
  ladder_buy_shares: 10          # Shares per ladder buy

guardrails:
  manual_confirm_threshold: 5000 # Orders above this $ require explicit CONFIRM
  verification_trades: 0         # 0 = fully autonomous, no manual confirm required
  api_retry_limit: 3             # Consecutive API failures before full halt
  paper_mode: true               # Set false only when ready for live trading

notifications:
  alert_email: "[FILL_IN]"       # e.g. you@yourdomain.com
  daily_report_time: "16:15"     # 4:15 PM local market time
  timezone: "America/New_York"

database:
  table: "decision_logic"
  state_file: "./logs/agent_state.json"
